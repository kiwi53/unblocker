<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Viewer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
        }
        .toolbar h1 {
            font-size: 16px;
            font-weight: 600;
            white-space: nowrap;
            color: #e94560;
        }
        .url-input {
            flex: 0 1 420px;
            min-width: 180px;
            padding: 10px 14px;
            border: 2px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: #eee;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .url-input:focus { border-color: #e94560; }
        .go-btn {
            padding: 10px 20px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .go-btn:hover { background: #c73652; }
        .preset-btn {
            width: 38px;
            height: 38px;
            padding: 0;
            border: 1px solid #0f3460;
            border-radius: 8px;
            background: #1a1a2e;
            color: #aaa;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .preset-btn:hover { background: #0f3460; color: #fff; border-color: #e94560; }
        .viewer {
            flex: 1;
            position: relative;
            background: #fff;
        }
        .viewer iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            justify-content: center;
            color: #555;
            font-size: 18px;
            background: #f0f0f0;
        }
        .status-msg {
            font-size: 14px;
            color: #888;
        }
        .error-msg {
            font-size: 14px;
            color: #c0392b;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <h1>Web Viewer</h1>
        <input class="url-input" id="urlInput" type="text" placeholder="Enter a URL (e.g. https://example.com)" spellcheck="false">
        <button class="go-btn" id="goBtn">Go</button>
        <button class="preset-btn" data-url="https://www.youtube.com" title="YouTube">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31.9 31.9 0 0 0 0 12a31.9 31.9 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.9 31.9 0 0 0 24 12a31.9 31.9 0 0 0-.5-5.8zM9.5 15.6V8.4l6.3 3.6-6.3 3.6z"/></svg>
        </button>
        <button class="preset-btn" data-url="https://discord.com" title="Discord">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.3 4.4a19.6 19.6 0 0 0-4.9-1.5 13.5 13.5 0 0 0-.6 1.2 18.1 18.1 0 0 0-5.6 0 12.5 12.5 0 0 0-.6-1.2A19.5 19.5 0 0 0 3.7 4.4 20.4 20.4 0 0 0 .2 17.3a19.8 19.8 0 0 0 6 3 14.2 14.2 0 0 0 1.2-2 12.7 12.7 0 0 1-2-.9l.5-.4a14 14 0 0 0 12.2 0l.5.4a12.8 12.8 0 0 1-2 .9 14.2 14.2 0 0 0 1.2 2 19.7 19.7 0 0 0 6-3A20.3 20.3 0 0 0 20.3 4.4zM8 14.7c-1.1 0-2-1-2-2.3s.9-2.3 2-2.3 2.1 1 2 2.3c0 1.3-.9 2.3-2 2.3zm8 0c-1.1 0-2-1-2-2.3s.9-2.3 2-2.3 2.1 1 2 2.3c0 1.3-.8 2.3-2 2.3z"/></svg>
        </button>
        <button class="preset-btn" data-url="https://www.google.com" title="Google">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        </button>
        <button class="preset-btn" data-url="https://github.com" title="GitHub">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .3a12 12 0 0 0-3.8 23.38c.6.11.82-.26.82-.58v-2.02c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.08-.74.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.8 1.3 3.49 1 .1-.78.42-1.3.76-1.6-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1-.32 3.3 1.23a11.5 11.5 0 0 1 6.02 0c2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.24 2.88.12 3.18a4.65 4.65 0 0 1 1.24 3.22c0 4.61-2.81 5.63-5.48 5.92.42.36.81 1.1.81 2.22v3.29c0 .32.22.7.82.58A12 12 0 0 0 12 .3z"/></svg>
        </button>
        <button class="preset-btn" data-url="https://gitlab.com" title="GitLab">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M22.65 14.39 12 22.13 1.35 14.39a.84.84 0 0 1-.3-.94l1.22-3.78 2.44-7.51a.43.43 0 0 1 .82 0l2.44 7.51h8.06l2.44-7.51a.43.43 0 0 1 .82 0l2.44 7.51 1.22 3.78a.84.84 0 0 1-.3.94z"/></svg>
        </button>
    </div>
    <div class="viewer">
        <div id="placeholder" class="placeholder">
            <span>Enter a URL above and click Go</span>
            <span class="status-msg" id="statusMsg"></span>
            <span class="error-msg" id="errorMsg"></span>
        </div>
        <iframe id="frame" style="display:none;width:100%;height:100%;border:none;"></iframe>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const goBtn = document.getElementById('goBtn');
        const frame = document.getElementById('frame');
        const placeholder = document.getElementById('placeholder');
        const statusMsg = document.getElementById('statusMsg');
        const errorMsg = document.getElementById('errorMsg');
        let currentProxiedUrl = '';

        function showPlaceholder(msg, isError) {
            frame.style.display = 'none';
            placeholder.style.display = 'flex';
            statusMsg.textContent = '';
            errorMsg.textContent = '';
            if (isError) errorMsg.textContent = msg || '';
            else statusMsg.textContent = msg || '';
        }

        function navigate() {
            let url = urlInput.value.trim();
            if (!url) return;
            if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
            try { new URL(url); } catch(e) { showPlaceholder('Invalid URL: ' + url, true); return; }

            currentProxiedUrl = url;
            showPlaceholder('Loading ' + url + '...', false);

            frame.onload = function() {
                placeholder.style.display = 'none';
                frame.style.display = 'block';
                // Try to extract the real URL from the iframe's proxy URL to update the URL bar
                try {
                    var loc = frame.contentWindow.location.href;
                    if (loc && loc !== 'about:blank') {
                        var match = loc.match(/[?&]url=([^&]+)/);
                        if (match) {
                            var decoded = decodeURIComponent(match[1]);
                            urlInput.value = decoded;
                            currentProxiedUrl = decoded;
                        }
                    }
                } catch(e) {
                    // Cross-origin — can't read, that's fine
                }
            };
            frame.onerror = function() {
                showPlaceholder('Failed to load page. Check console for details.', true);
            };

            frame.src = '/proxy?url=' + encodeURIComponent(url);
        }

        // Catch navigations where the injected script fires beforeunload postMessage
        window.addEventListener('message', function(e) {
            if (e.data && e.data.type === 'proxyNav' && e.data.href) {
                var href = e.data.href;
                // Extract real URL from proxy URL
                try {
                    var match = href.match(/[?&]url=([^&]+)/);
                    if (match) {
                        var decoded = decodeURIComponent(match[1]);
                        urlInput.value = decoded;
                        currentProxiedUrl = decoded;
                    }
                } catch(e) {}
            }
        });

        goBtn.addEventListener('click', navigate);
        urlInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') navigate(); });

        document.querySelectorAll('.preset-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                urlInput.value = btn.dataset.url;
                navigate();
            });
        });
    </script>
</body>
</html>
